# Deploy over Tailscale; fizzy.bartasurba.com resolves to Cloudflare's proxy, not the box.
servers:
  web:
    - 100.99.133.48

proxy:
  host: fizzy.bartasurba.com

ssh:
  user: app

# The shared Kamal registry container (port 5000) replaced the old localhost:5555 one.
registry:
  server: kamal-docker-registry:5000
  username: app
  password:
    - KAMAL_REGISTRY_PASSWORD

# Reuse the host's buildkit builder that trusts the plain-HTTP shared registry.
builder:
  arch: amd64
  remote: ssh://app@100.99.133.48
  local: false
  context: .
